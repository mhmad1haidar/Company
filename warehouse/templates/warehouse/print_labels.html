{% extends "base_modern.html" %}

{% block title %}Print Barcode Labels - Warehouse{% endblock %}

{% block content %}
<style>
    @media print {
        body * { visibility: hidden; }
        .labels-container, .labels-container * { visibility: visible; }
        .labels-container { position: absolute; left: 0; top: 0; }
        .no-print { display: none !important; }
    }
    
    .label {
        border: 1px solid #000;
        padding: 10px;
        margin: 5px;
        display: inline-block;
        width: 200px;
        height: 120px;
        text-align: center;
        page-break-inside: avoid;
    }
    
    .label img {
        max-width: 100%;
        max-height: 60px;
    }
    
    .label-code {
        font-weight: bold;
        font-size: 14px;
        margin-top: 5px;
    }
    
    .label-name {
        font-size: 12px;
        margin-top: 2px;
    }
</style>

<div class="main-content">
    <div class="card-modern mb-4 no-print">
        <div class="card-body-modern py-3">
            <div class="d-flex justify-content-between align-items-center">
                <h4 class="mb-0">Print Barcode Labels</h4>
                <button onclick="window.print()" class="btn btn-primary btn-sm">
                    <i class="bi bi-printer"></i> Print
                </button>
            </div>
        </div>
    </div>

    <div class="labels-container">
        {% for item in items %}
        <div class="label">
            <img src="{% url 'warehouse:barcode_image' item.pk %}" alt="Barcode">
            <div class="label-code">{{ item.code }}</div>
            <div class="label-name">{{ item.name|truncatewords:3 }}</div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}

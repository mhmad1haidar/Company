{% extends "base_modern.html" %}

{% block title %}New Stocktaking - Warehouse{% endblock %}

{% block content %}
<div class="main-content">
    <div class="card-modern mb-4">
        <div class="card-body-modern py-3">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h4 class="mb-1">New Stocktaking</h4>
                    <p class="text-muted mb-0 small">Create new inventory count audit</p>
                </div>
                <a href="{% url 'warehouse:stocktaking_list' %}" class="btn btn-outline-secondary btn-sm">
                    <i class="bi bi-arrow-left"></i> Back
                </a>
            </div>
        </div>
    </div>

    <div class="card-modern">
        <div class="card-body-modern">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label">Name *</label>
                    {{ form.name }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Description</label>
                    {{ form.description }}
                </div>
                <div class="mb-3">
                    <label class="form-label">Notes</label>
                    {{ form.notes }}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i> Create
                    </button>
                    <a href="{% url 'warehouse:stocktaking_list' %}" class="btn btn-secondary">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Modern Business Platform - Professional SaaS Dashboard">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="DENY">
    <meta http-equiv="X-XSS-Protection" content="1; mode=block">
    <title>Sign In - Platform</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <!-- Inter Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
        
    <style>
        :root {
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --primary-light: #6366f1;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #06b6d4;
            
            --bg-primary: #ffffff;
            --bg-secondary: #f8fafc;
            --bg-tertiary: #f1f5f9;
            
            --text-primary: #1e293b;
            --text-secondary: #64748b;
            --text-tertiary: #94a3b8;
            
            --border-color: #e2e8f0;
            --border-hover: #cbd5e1;
            
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            
            --border-radius: 6px;
            --border-radius-lg: 8px;
            
            --transition: all 0.15s ease;
            
            --font-xs: 12px;
            --font-sm: 13px;
            --font-base: 14px;
            --font-lg: 16px;
            --font-xl: 18px;
            --font-2xl: 20px;
            --font-3xl: 24px;
        }
        
        * {
            box-sizing: border-box;
        }
        
        ul, li {
            margin: 0;
            padding: 0;
            list-style: none;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            font-size: var(--font-sm);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        
        /* Professional SaaS Navbar */
        .navbar-modern {
            background: white;
            border-bottom: 1px solid var(--border-color);
            box-shadow: var(--shadow-sm);
            padding: 0;
            position: sticky;
            top: 0;
            z-index: 1000;
            width: 100%;
        }
        
        .navbar-container {
            width: 100%;
            max-width: 100vw;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            height: 56px;
            overflow: visible;
        }
        
        .navbar-brand {
            display: flex;
            align-items: center;
            text-decoration: none;
            font-weight: 600;
            font-size: var(--font-lg);
            color: var(--text-primary);
            transition: var(--transition);
            flex-shrink: 0;
        }
        
        .navbar-brand:hover {
            color: var(--primary);
        }
        
        .navbar-brand i {
            font-size: var(--font-xl);
            margin-right: 8px;
            color: var(--primary);
        }
        
        .navbar-nav {
            display: flex !important;
            align-items: center !important;
            list-style: none !important;
            margin: 0 !important;
            padding: 0 !important;
            gap: 4px;
            flex-wrap: nowrap;
            flex-direction: row !important;
            position: static !important;
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            width: auto !important;
        }
        
        .navbar-nav li {
            margin: 0;
        }
        
        .nav-link {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            text-decoration: none;
            color: var(--text-secondary);
            border-radius: var(--border-radius);
            transition: var(--transition);
            font-weight: 500;
            font-size: var(--font-sm);
            white-space: nowrap;
            border: 1px solid transparent;
        }
        
        .nav-link:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            border-color: var(--border-color);
        }
        
        .nav-link.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        .nav-link i {
            margin-right: 6px;
            font-size: var(--font-base);
        }
        
        .navbar-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }
        
        /* Responsive Navigation */
        @media (max-width: 768px) {
            .navbar-modern .navbar-nav {
                position: fixed !important;
                top: 56px !important;
                left: 0 !important;
                right: 0 !important;
                background: white !important;
                border-bottom: 1px solid var(--border-color) !important;
                box-shadow: var(--shadow) !important;
                flex-direction: column !important;
                padding: 8px 0 !important;
                display: none !important;
                z-index: 998 !important;
                width: 100% !important;
            }
            
            .navbar-modern .navbar-nav.show {
                display: flex !important;
            }
            
            .navbar-modern .nav-link {
                padding: 12px 20px !important;
                border-bottom: 1px solid var(--border-color) !important;
                width: 100% !important;
            }
            
            .mobile-menu-toggle {
                display: block !important;
            }
        }
        
        @media (min-width: 769px) {
            .navbar-modern .navbar-nav {
                display: flex !important;
                align-items: center !important;
                list-style: none !important;
                margin: 0 !important;
                padding: 0 !important;
                gap: 4px !important;
                flex-wrap: nowrap !important;
                flex-direction: row !important;
                position: static !important;
                background: transparent !important;
                border: none !important;
                box-shadow: none !important;
                width: auto !important;
            }
            
            .mobile-menu-toggle {
                display: none !important;
            }
        }
        
        /* Enhanced User Profile Dropdown */
        .user-profile-dropdown .dropdown-toggle {
            background: transparent;
            border: 1px solid var(--gray-200);
            border-radius: 10px;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s ease;
            color: var(--gray-900);
        }
        
        .user-profile-dropdown .dropdown-toggle:hover {
            background: var(--gray-50);
            border-color: var(--gray-300);
            box-shadow: var(--shadow);
        }
        
        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 12px;
            flex-shrink: 0;
        }
        
        .user-info {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            min-width: 0;
        }
        
        .user-name {
            font-weight: 600;
            color: var(--gray-900);
            font-size: 14px;
            line-height: 1.2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        
        .user-role {
            font-size: 12px;
            color: var(--gray-500);
            line-height: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 120px;
        }
        
        .dropdown-menu {
            border: 1px solid var(--gray-200);
            border-radius: 12px;
            padding: 0.5rem;
            min-width: 220px;
            box-shadow: var(--shadow-lg);
            animation: dropdown-fade-in 0.2s ease;
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.95);
        }
        
        @keyframes dropdown-fade-in {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .dropdown-item {
            border-radius: 8px;
            padding: 0.625rem 0.875rem;
            font-size: 14px;
            transition: all 0.2s ease;
            margin: 0.25rem 0;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .dropdown-item:hover {
            background: var(--gray-50);
            color: var(--gray-900);
            transform: translateX(2px);
        }
        
        .dropdown-item.text-danger:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        .dropdown-item i {
            font-size: 16px;
            opacity: 0.7;
            width: 16px;
        }
        
        .dropdown-divider {
            margin: 0.5rem 0;
            border-color: var(--gray-200);
        }
        
        /* Full-Width Professional Layout */
        .main-content {
            padding: 20px 40px;
            width: 100%;
            min-height: calc(100vh - 56px);
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }
        
        .page-title-section h1 {
            font-size: var(--font-3xl);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 8px 0;
            line-height: 1.2;
        }
        
        .page-title-section p {
            color: var(--text-secondary);
            margin: 0;
            font-size: var(--font-base);
            font-weight: 400;
        }
        
        .page-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        /* Compact Professional Cards */
        .card-modern {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 16px;
            transition: var(--transition);
            overflow: hidden;
        }
        
        .card-modern:hover {
            box-shadow: var(--shadow);
        }
        
        .card-header-modern {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-secondary);
        }
        
        .card-title-modern {
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin: 0;
            display: flex;
            align-items: center;
        }
        
        .card-body-modern {
            padding: 20px;
        }
        
        /* Compact Stats Cards */
        .stat-card {
            background: white;
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: 16px;
            text-align: center;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        
        .stat-card:hover {
            box-shadow: var(--shadow);
        }
        
        .stat-icon {
            width: 40px;
            height: 40px;
            border-radius: var(--border-radius);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 12px auto;
            font-size: var(--font-xl);
            color: white;
        }
        
        .stat-icon.primary {
            background: var(--primary);
        }
        
        .stat-icon.success {
            background: var(--success);
        }
        
        .stat-icon.warning {
            background: var(--warning);
        }
        
        .stat-icon.danger {
            background: var(--danger);
        }
        
        .stat-icon.info {
            background: var(--info);
        }
        
        .stat-number {
            font-size: var(--font-3xl);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1;
        }
        
        .stat-label {
            font-size: var(--font-xs);
            color: var(--text-secondary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stat-change {
            font-size: 12px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }
        
        .stat-change.positive {
            color: var(--success);
        }
        
        .stat-change.negative {
            color: var(--danger);
        }
        
        /* Modern Buttons */
        .btn-modern {
            border-radius: 8px;
            font-weight: 500;
            padding: 0.625rem 1.25rem;
            border: none;
            transition: all 0.2s ease;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            overflow: hidden;
        }
        
        .btn-modern::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }
        
        .btn-modern:hover::before {
            left: 100%;
        }
        
        .btn-modern:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            text-decoration: none;
        }
        
        .btn-primary-modern {
            background: var(--primary);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        
        .btn-primary-modern:hover {
            background: var(--primary-dark);
            color: white;
            box-shadow: var(--shadow);
        }
        
        .btn-outline-modern {
            background: transparent;
            color: var(--primary);
            border: 1px solid var(--primary);
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        
        .btn-outline-modern:hover {
            background: var(--primary);
            color: white;
        }
        
        .btn-warning-modern {
            background: var(--warning);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: var(--font-sm);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            text-decoration: none;
        }
        
        .btn-warning-modern:hover {
            background: #d97706;
            color: white;
            box-shadow: var(--shadow);
        }
        
        /* Compact Form Elements */
        .form-control-modern,
        input.form-control-modern,
        select.form-control-modern,
        textarea.form-control-modern {
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 8px 12px;
            font-size: var(--font-sm);
            font-weight: 400;
            transition: var(--transition);
            background: white;
            width: 100%;
            color: var(--text-primary);
        }
        
        .form-control-modern:focus,
        input.form-control-modern:focus,
        select.form-control-modern:focus,
        textarea.form-control-modern:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        
        .form-label-modern {
            font-weight: 500;
            color: var(--text-primary);
            margin-bottom: 6px;
            font-size: var(--font-sm);
            display: block;
        }
        
        /* Dense Professional Tables */
        .table-modern {
            background: white;
            border-radius: var(--border-radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            font-size: var(--font-sm);
        }
        
        .table-modern thead {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        
        .table-modern th {
            font-weight: 600;
            color: var(--text-primary);
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 12px 16px;
            border: none;
        }
        
        .table-modern td {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary);
            font-weight: 400;
            vertical-align: middle;
            font-size: var(--font-sm);
        }
        
        .table-modern tbody tr:hover {
            background: var(--bg-secondary);
        }
        
        .table-modern tbody tr:last-child td {
            border-bottom: none;
        }
        
        /* Compact Badges */
        .badge-modern {
            padding: 4px 8px;
            border-radius: var(--border-radius);
            font-weight: 500;
            font-size: var(--font-xs);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        
        .badge-primary-modern {
            background: rgba(79, 70, 229, 0.1);
            color: var(--primary);
        }
        
        .badge-success-modern {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }
        
        .badge-warning-modern {
            background: rgba(245, 158, 11, 0.1);
            color: var(--warning);
        }
        
        .badge-danger-modern {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
        }
        
        /* Compact Empty States */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            display: block;
        }
        
        .empty-state-title {
            font-size: var(--font-lg);
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }
        
        .empty-state-text {
            font-size: var(--font-sm);
            color: var(--text-secondary);
            margin-bottom: 20px;
            line-height: 1.5;
        }
        
        /* Modern Alerts */
        .alert-modern {
            border: none;
            border-radius: var(--border-radius);
            padding: 1rem 1.25rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .alert-modern i {
            font-size: 20px;
            flex-shrink: 0;
        }
        
        .alert-success-modern {
            background: rgba(16, 185, 129, 0.1);
            color: #065f46;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        
        .alert-danger-modern {
            background: rgba(239, 68, 68, 0.1);
            color: #991b1b;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .alert-warning-modern {
            background: rgba(245, 158, 11, 0.1);
            color: #92400e;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }
        
        .alert-info-modern {
            background: rgba(6, 182, 212, 0.1);
            color: #0e7490;
            border: 1px solid rgba(6, 182, 212, 0.2);
        }
        
        /* Login Page */
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 2rem;
            position: relative;
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="white" opacity="0.1"/><circle cx="75" cy="75" r="1" fill="white" opacity="0.1"/><circle cx="50" cy="10" r="0.5" fill="white" opacity="0.1"/><circle cx="10" cy="50" r="0.5" fill="white" opacity="0.1"/><circle cx="90" cy="30" r="0.5" fill="white" opacity="0.1"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }
        
        .login-card {
            background: white;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-xl);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            position: relative;
            z-index: 1;
        }
        
        .login-logo {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .login-logo i {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin: 0 auto 1rem;
            box-shadow: var(--shadow-lg);
        }
        
        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--gray-900);
            margin-bottom: 0.5rem;
        }
        
        .login-subtitle {
            color: var(--gray-500);
            font-size: 14px;
            margin-bottom: 2rem;
        }
        
        /* Empty States */
        .empty-state {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--gray-500);
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--gray-300);
            margin-bottom: 1rem;
        }
        
        .empty-state-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--gray-700);
            margin-bottom: 0.5rem;
        }
        
        .empty-state-text {
            font-size: 14px;
            margin-bottom: 1.5rem;
        }
        
        /* Loading States */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--gray-200);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            .navbar-modern {
                padding: 0 1rem;
            }
            
            .navbar-nav {
                display: none;
            }
            
            .mobile-menu-toggle {

<script>
document.addEventListener('DOMContentLoaded', function() {
    // Add focus effects to form fields
    const formControls = document.querySelectorAll('.form-control-modern');
    formControls.forEach(control => {
        control.addEventListener('focus', function() {
            this.parentElement.classList.add('form-group-focused');
        });
        
        control.addEventListener('blur', function() {
            if (!this.value) {
                this.parentElement.classList.remove('form-group-focused');
            }
        });
        
        // Check initial state
        if (control.value) {
            control.parentElement.classList.add('form-group-focused');
        }
    });
});
</script>
